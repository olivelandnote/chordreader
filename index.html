<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmony Reading</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f5f8;
  text-align: center;
  padding: 20px;
}
canvas {
  background: white;
  border: 1px solid #ccc;
  margin-top: 20px;
}
button {
  margin: 10px;
  padding: 12px 18px;
  font-size: 14px;
  cursor: pointer;
}
.levels button.active {
  background: #E8690A;
  color: white;
}
.stats {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Harmony Reading</h1>

<div class="levels">
  <button onclick="setLevel(1)" id="l1" class="active">Level 1</button>
  <button onclick="setLevel(2)" id="l2">Level 2</button>
  <button onclick="setLevel(3)" id="l3">Level 3</button>
</div>

<div class="stats">
  Question: <span id="qNum">1</span> |
  Timer: <span id="timer">0:00</span> |
  Level: <span id="levelText">1</span>
</div>

<canvas id="staffCanvas" width="600" height="260"></canvas>

<h2 id="answer">?</h2>

<button onclick="reveal()">Reveal</button>
<button onclick="nextQ()">Next</button>

<script>
// ===== NOTES =====
const TN = { C4:0, D4:1, E4:2, F4:3, G4:4, A4:5, B4:6, C5:7, D5:8 };
const BN = { E2:0, F2:1, G2:2, A2:3, B2:4, C3:5, D3:6, E3:7, F3:8, G3:9 };

// ===== CHORDS =====
const CHORDS = [
  { level:1, name:"C Major", t:["E4","G4"], b:["C3","G3"] },
  { level:1, name:"A Minor", t:["A4","C5"], b:["A2","E3"] },

  { level:2, name:"G Major", t:["G4","B4"], b:["G2","D3"] },
  { level:2, name:"E Minor", t:["E4","G4"], b:["E2","B2"] },
  { level:2, name:"F Major", t:["F4","A4"], b:["F2","C3"] },

  { level:3, name:"D Major", t:["D4","A4"], b:["D3","A3"] },
  { level:3, name:"B Minor", t:["D4","F4"], b:["B2","F3"] }
];

let state = {
  level:1,
  q:null,
  qNum:1,
  timer:0,
  timerId:null
};

// ===== TIMER =====
function startTimer(){
  stopTimer();
  state.timer = 0;
  state.timerId = setInterval(()=>{
    state.timer++;
    const m = Math.floor(state.timer/60);
    const s = state.timer % 60;
    document.getElementById("timer").innerText =
      m + ":" + (s<10?"0":"") + s;
  },1000);
}

function stopTimer(){
  if(state.timerId) clearInterval(state.timerId);
}

// ===== LOGIC =====
function pool(){
  return CHORDS.filter(c=>c.level===state.level);
}

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function nextQ(){
  state.qNum++;
  newQ();
}

function newQ(){
  state.q = pick(pool());
  document.getElementById("answer").innerText = "?";
  document.getElementById("qNum").innerText = state.qNum;
  document.getElementById("levelText").innerText = state.level;
  draw();
  startTimer();
}

function reveal(){
  document.getElementById("answer").innerText = state.q.name;
  stopTimer();
}

function setLevel(l){
  state.level = l;
  state.qNum = 1;

  document.querySelectorAll(".levels button").forEach(b=>b.classList.remove("active"));
  document.getElementById("l"+l).classList.add("active");

  newQ();
}

// ===== DRAW =====
function y(top, slot){
  return top + (10-slot)*5;
}

function staff(ctx, top){
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(50, top+i*10);
    ctx.lineTo(550, top+i*10);
    ctx.stroke();
  }
}

function note(ctx,x,y){
  ctx.beginPath();
  ctx.ellipse(x,y,8,5,0,0,Math.PI*2);
  ctx.stroke();
}

function draw(){
  const c=document.getElementById("staffCanvas");
  const ctx=c.getContext("2d");

  ctx.clearRect(0,0,600,260);

  const tTop=40;
  const bTop=140;

  staff(ctx,tTop);
  staff(ctx,bTop);

  state.q.t.forEach(n=>{
    note(ctx,300,y(tTop,TN[n]));
  });

  state.q.b.forEach(n=>{
    note(ctx,300,y(bTop,BN[n]));
  });
}

// ===== INIT =====
newQ();
</script>

</body>
</html>
